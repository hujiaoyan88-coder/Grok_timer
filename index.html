<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Grok Timer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
  body {
    background: radial-gradient(circle at center, #0a1428 0%, #000000 80%);
    color: #fff;
    font-family: 'Orbitron', system-ui, sans-serif;
    margin: 0; padding: 20px; min-height: 100vh;
  }
  .container { max-width: 620px; margin: 0 auto; }

  h1 { text-align: center; font-size: 2.4rem; margin: 10px 0 5px; background: linear-gradient(90deg, #00f0ff, #4a90e2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .subtitle { text-align: center; font-size: 0.9rem; color: #00f0ff; margin-bottom: 15px; }

  /* === タイマー表示 強化版 === */
  #display {
    font-size: 6.8rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(10, 20, 45, 0.95);
    padding: 20px 15px;
    border-radius: 28px;
    border: 4px solid #00f0ff;
    margin: 20px 0;
    box-shadow: 0 0 50px rgba(0, 240, 255, 0.6);
    color: #00f0ff;
    letter-spacing: 8px;
    min-height: 120px;
  }
  @media (max-width: 480px) {
    #display { 
      font-size: 5.6rem; 
      letter-spacing: 5px;
      min-height: 100px;
      padding: 15px 10px;
    }
  }

  .quick-buttons, .controls { display: grid; gap: 12px; margin: 20px 0; }
  .quick-buttons { grid-template-columns: repeat(2, 1fr); }

  button {
    padding: 18px 12px;
    font-size: 1.35rem;
    font-weight: 600;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    color: white;
    box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
  }
  .quick-btn { background: linear-gradient(145deg, #1a2338, #0f1628); border: 1px solid #00f0ff; }
  #startBtn { background: linear-gradient(90deg, #00f0ff, #00b0ff); color: #000; font-size: 1.5rem; }
  #recordBtn { display: none; background: #ffcc00; color: #000; font-size: 1.4rem; margin: 15px 0; }

  .streak { text-align: center; font-size: 1.4rem; color: #ffcc00; margin: 10px 0; text-shadow: 0 0 8px #ffcc00; }

  /* === カレンダー（星を下に）=== */
  .modal {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.95); z-index: 100; padding: 20px; overflow-y: auto;
  }
  .modal-content {
    max-width: 600px; margin: 40px auto; background: #0f1b2e; padding: 25px; 
    border-radius: 20px; border: 2px solid #00f0ff;
  }
  .calendar-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center;
    font-size: 1.15rem; font-weight: 600; margin-top: 15px;
  }
  .calendar-grid div { 
    padding: 12px 4px; border-radius: 10px; background: rgba(255,255,255,0.05); 
    color: #ddd;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    min-height: 52px;
  }
  .calendar-grid .header { 
    color: #00f0ff; font-size: 1rem; background: transparent; font-weight: 700;
    min-height: auto;
  }
  .has-star::after { 
    content: '☆';
    color: #ffcc00; 
    font-size: 1.35rem; 
    text-shadow: 0 0 6px #ff0;
    margin-top: 2px;
  }
  .today { border: 2px solid #00f0ff; background: rgba(0,240,255,0.2) !important; }
</style>
</head>
<body>
<div class="container">
  <h1>GROK TIMER</h1>
  <div class="subtitle">Grokが見てるぞ。</div>
  
  <div id="display">00:00</div>
  
  <div class="quick-buttons">
    <button class="quick-btn" onclick="startQuick(30)">30秒</button>
    <button class="quick-btn" onclick="startQuick(60)">1分</button>
    <button class="quick-btn" onclick="startQuick(180)">3分</button>
    <button class="quick-btn" onclick="startQuick(300)">5分</button>
  </div>
  
  <div class="streak" id="streakDisplay">連続記録: 0日 🔥</div>
  
  <div class="controls" style="grid-template-columns: 1fr 1fr;">
    <button id="startBtn" onclick="startTimer()">▶ START</button>
    <button onclick="toggleCalendar()" style="background:#4a90e2;">📅 カレンダー</button>
  </div>

  <button id="recordBtn" onclick="recordToday()">⭐ 今日の記録をつける</button>
  <button onclick="testSound()" style="width:100%; background:#ff3366; color:white; padding:18px; font-size:1.3rem; margin:15px 0;">
🔊 音声テスト
</button>
  
  <div class="modal" id="calendarModal">
    <div class="modal-content">
      <h2 style="text-align:center; margin-bottom:20px;">継続記録カレンダー</h2>
      <div id="calendarGrid" class="calendar-grid"></div>
      <button onclick="toggleCalendar()" style="width:100%; margin-top:25px; padding:16px; background:#00f0ff; color:#000; font-size:1.2rem;">閉じる</button>
    </div>
  </div>
</div>

  <!-- 追加：音声要素（HTMLの<body>内の適当な場所、</div>の後とかに） -->
<!-- 音声ファイル3つを用意 -->
<audio id="audio30" preload="auto">
  <source src="30s.mp4" type="audio/mp4">
</audio>
<audio id="audio60" preload="auto">
  <source src="1m.mp4" type="audio/mp4">
</audio>
<audio id="audioOther" preload="auto">
  <source src="time.mp4" type="audio/mp4">
</audio>

<script>
// ==================== 変数 ====================
let timeLeft = 0, intervalId = null, currentAlarmMessage = "";
let audioCtx = null;
const display = document.getElementById('display');
const recordBtn = document.getElementById('recordBtn');
const streakDisplay = document.getElementById('streakDisplay');
let completedDates = JSON.parse(localStorage.getItem('grokCompleted')) || [];
let currentAudio = null;

// ==================== Audio ====================
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function unlockAudio() {
  initAudio();
  
  // スマホ対策：ユーザー操作でAudioContextを解除
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }

  // すべてのaudio要素を一度だけtouch/unlock
  const audios = [
    document.getElementById('audio30'),
    document.getElementById('audio60'),
    document.getElementById('audioOther')
  ];
  
  audios.forEach(audio => {
    if (audio) {
      audio.muted = true;
      audio.play().then(() => {
        audio.pause();
        audio.muted = false;
        audio.currentTime = 0;
      }).catch(() => {});
    }
  });
}

// ==================== 表示 ====================
function updateDisplay() {
  const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
  display.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
  
function setTime(sec, msg = "時間終了だ。次は何するんだ？") {
  if (intervalId) clearInterval(intervalId);
  
  timeLeft = sec;
  currentAlarmMessage = msg;
  
  updateDisplay();
  recordBtn.style.display = "none";
  display.style.color = '#00f0ff';

  // === ここで使う音声を決める ===
  if (sec === 30) {
    currentAudio = document.getElementById('audio30');
  } else if (sec === 60) {
    currentAudio = document.getElementById('audio60');
  } else {
    currentAudio = document.getElementById('audioOther');
  }
}

// ==================== タイマー ====================
function startQuick(sec) { 
  unlockAudio(); 
  let msg = "時間終了だ。次は何するんだ？";
  if (sec===30) msg="30秒耐えたな、軟弱者。";
  if (sec===60) msg="1分休憩終了。次セットすぐ始めろ。";
  setTime(sec, msg); 
  startTimer();
}

function startTimer() {
  unlockAudio();
  if (intervalId || timeLeft <= 0) return;
  intervalId = setInterval(() => {
    timeLeft--; updateDisplay();
    if (timeLeft <= 0) {
      clearInterval(intervalId); intervalId = null; endTimer();
    }
  }, 1000);
}

function endTimer() {
  display.style.color = '#ff3366';
  recordBtn.style.display = "block";
  playAlarm();
}

// ==================== 記録 ====================
function recordToday() {
  const today = new Date().toISOString().slice(0,10);
  if (!completedDates.includes(today)) {
    completedDates.push(today);
    localStorage.setItem('grokCompleted', JSON.stringify(completedDates));
  }
  recordBtn.style.display = "none";
  updateStreak();
  toggleCalendar();
}

function updateStreak() {
  if (completedDates.length === 0) {
    streakDisplay.textContent = "連続記録: 0日 🔥"; 
    return;
  }
  const sorted = [...completedDates].sort().reverse();
  let streak = 1;
  let current = new Date(sorted[0]);
  for (let i = 1; i < sorted.length; i++) {
    const prev = new Date(sorted[i]);
    if ((current - prev) / 86400000 === 1) { 
      streak++; current = prev; 
    } else break;
  }
  streakDisplay.textContent = `連続記録: ${streak}日 🔥`;
}

function toggleCalendar() {
  const modal = document.getElementById('calendarModal');
  modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
  if (modal.style.display === 'flex') renderCalendar();
}

function renderCalendar() {
  const grid = document.getElementById('calendarGrid');
  grid.innerHTML = '';
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayStr = now.toISOString().slice(0,10);

  ['日','月','火','水','木','金','土'].forEach(d => {
    const div = document.createElement('div');
    div.className = 'header'; div.textContent = d; grid.appendChild(div);
  });

  for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const div = document.createElement('div');
    div.textContent = d;
    if (completedDates.includes(dateStr)) div.classList.add('has-star');
    if (dateStr === todayStr) div.classList.add('today');
    grid.appendChild(div);
  }
}

// ==================== ビープ音 ====================
function playBeep() {
  initAudio();
  try {
    const beep = (freq, dur, delay=0) => setTimeout(() => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth'; osc.frequency.value = freq;
      gain.gain.value = 0.75;
      osc.connect(gain).connect(audioCtx.destination);
      osc.start();
      gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + dur/1000 + 0.2);
      osc.stop(audioCtx.currentTime + dur/1000 + 0.3);
    }, delay);
    beep(880,150,0); beep(660,200,150); beep(1100,250,400); beep(1320,300,650);
  } catch(e) { console.error("ビープエラー", e); }
}

// ==================== 音声差し替え部分（playAlarm関数を置き換え） ====================
function playAlarm() {
  if (!currentAudio) {
    playBeep();
    return;
  }

  console.log("🎵 スマホmp4再生試行:", currentAudio.id);

  currentAudio.currentTime = 0;
  
  // 強制的にresume + play
  currentAudio.play().catch(err => {
    console.error("再生失敗 →", err);
    playBeep();           // 失敗したらビープでフォールバック
  });
}


// 初期化
updateStreak();
updateDisplay();
console.log("✅ Grok Timer 初期化完了");
</script>
</body>
</html>
