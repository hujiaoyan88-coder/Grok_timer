<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Grok Timer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
  body {
    background: radial-gradient(circle at center, #0a1428 0%, #000000 80%);
    color: #fff;
    font-family: 'Orbitron', system-ui, sans-serif;
    margin: 0; padding: 20px; min-height: 100vh;
  }
  .container { max-width: 620px; margin: 0 auto; }

  h1 { text-align: center; font-size: 2.4rem; margin: 10px 0 5px; background: linear-gradient(90deg, #00f0ff, #4a90e2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .subtitle { text-align: center; font-size: 0.9rem; color: #00f0ff; margin-bottom: 15px; }

  /* === タイマー表示 強化版 === */
  #display {
    font-size: 6.8rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(10, 20, 45, 0.95);
    padding: 20px 15px;
    border-radius: 28px;
    border: 4px solid #00f0ff;
    margin: 20px 0;
    box-shadow: 0 0 50px rgba(0, 240, 255, 0.6);
    color: #00f0ff;
    letter-spacing: 8px;
    min-height: 120px;
  }
  @media (max-width: 480px) {
    #display { 
      font-size: 5.6rem; 
      letter-spacing: 5px;
      min-height: 100px;
      padding: 15px 10px;
    }
  }

  .quick-buttons, .controls { display: grid; gap: 12px; margin: 20px 0; }
  .quick-buttons { grid-template-columns: repeat(2, 1fr); }

  button {
    padding: 18px 12px;
    font-size: 1.35rem;
    font-weight: 600;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    color: white;
    box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
  }
  .quick-btn { background: linear-gradient(145deg, #1a2338, #0f1628); border: 1px solid #00f0ff; }
  #startBtn { background: linear-gradient(90deg, #00f0ff, #00b0ff); color: #000; font-size: 1.5rem; }
  #recordBtn { display: none; background: #ffcc00; color: #000; font-size: 1.4rem; margin: 15px 0; }

  .streak { text-align: center; font-size: 1.4rem; color: #ffcc00; margin: 10px 0; text-shadow: 0 0 8px #ffcc00; }

  /* === カレンダー（星を下に）=== */
  .modal {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.95); z-index: 100; padding: 20px; overflow-y: auto;
  }
  .modal-content {
    max-width: 600px; margin: 40px auto; background: #0f1b2e; padding: 25px; 
    border-radius: 20px; border: 2px solid #00f0ff;
  }
  .calendar-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center;
    font-size: 1.15rem; font-weight: 600; margin-top: 15px;
  }
  .calendar-grid div { 
    padding: 12px 4px; border-radius: 10px; background: rgba(255,255,255,0.05); 
    color: #ddd;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    min-height: 52px;
  }
  .calendar-grid .header { 
    color: #00f0ff; font-size: 1rem; background: transparent; font-weight: 700;
    min-height: auto;
  }
  .has-star::after { 
    content: '☆';
    color: #ffcc00; 
    font-size: 1.35rem; 
    text-shadow: 0 0 6px #ff0;
    margin-top: 2px;
  }
  .today { border: 2px solid #00f0ff; background: rgba(0,240,255,0.2) !important; }
</style>
</head>
<body>
<div class="container">
  <h1>GROK TIMER</h1>
  <div class="subtitle">Grokが見てるぞ。</div>
  
  <div id="display">00:00</div>
  
  <div class="quick-buttons">
    <button class="quick-btn" onclick="startQuick(30)">30秒</button>
    <button class="quick-btn" onclick="startQuick(60)">1分</button>
    <button class="quick-btn" onclick="startQuick(180)">3分</button>
    <button class="quick-btn" onclick="startQuick(300)">5分</button>
  </div>
  
  <div class="streak" id="streakDisplay">連続記録: 0日 🔥</div>
  
  <div class="controls" style="grid-template-columns: 1fr 1fr;">
    <button id="startBtn" onclick="startTimer()">▶ START</button>
    <button onclick="toggleCalendar()" style="background:#4a90e2;">📅 カレンダー</button>
  </div>

  <button id="recordBtn" onclick="recordToday()">⭐ 今日の記録をつける</button>
  <button onclick="testSound()" style="width:100%; background:#ff3366; color:white; padding:18px; font-size:1.3rem; margin:15px 0;">
🔊 音声テスト
</button>
  
  <div class="modal" id="calendarModal">
    <div class="modal-content">
      <h2 style="text-align:center; margin-bottom:20px;">継続記録カレンダー</h2>
      <div id="calendarGrid" class="calendar-grid"></div>
      <button onclick="toggleCalendar()" style="width:100%; margin-top:25px; padding:16px; background:#00f0ff; color:#000; font-size:1.2rem;">閉じる</button>
    </div>
  </div>
</div>

<script>
// ==================== 基本変数 ====================
let timeLeft = 0, intervalId = null, currentAlarmMessage = "";
let audioCtx = null;
const display = document.getElementById('display');
const recordBtn = document.getElementById('recordBtn');
const streakDisplay = document.getElementById('streakDisplay');
let completedDates = JSON.parse(localStorage.getItem('grokCompleted')) || [];

// ==================== Audio初期化 ====================
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

function unlockAudio() {
  initAudio();
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.frequency.value = 1;
    g.gain.value = 0.001;
    o.connect(g).connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + 0.01);
  } catch(e) {}
}

// ==================== 表示更新 ====================
function updateDisplay() {
  const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
  display.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function setTime(sec, msg = "時間終了だ。次は何するんだ？") {
  if (intervalId) clearInterval(intervalId);
  timeLeft = sec;
  currentAlarmMessage = msg;
  updateDisplay();
  recordBtn.style.display = "none";
  display.style.color = '#00f0ff';
}

// ==================== タイマー ====================
function startQuick(sec) {
  unlockAudio();
  let msg = "時間終了だ。次は何するんだ？";
  if (sec === 30) msg = "30秒耐えたな、軟弱者。";
  if (sec === 60) msg = "1分休憩終了。次セットすぐ始めろ。";
  if (sec === 180) msg = "3分集中したな。まだまだいけるぞ。";
  if (sec === 300) msg = "5分お疲れ。Grokは褒めてやる。";
  setTime(sec, msg);
  startTimer();
}

function startTimer() {
  unlockAudio();
  if (intervalId || timeLeft <= 0) return;
  
  intervalId = setInterval(() => {
    timeLeft--;
    updateDisplay();
    if (timeLeft <= 0) {
      clearInterval(intervalId);
      intervalId = null;
      endTimer();
    }
  }, 1000);
}

function endTimer() {
  display.style.color = '#ff3366';
  recordBtn.style.display = "block";
  playAlarm();           // ← ここで本物のアラーム
}

// ==================== 記録・カレンダー（変更なし）===================
function recordToday() { /* ... 省略（元のまま） ... */ }
function updateStreak() { /* ... 元のまま ... */ }
function toggleCalendar() { /* ... 元のまま ... */ }
function renderCalendar() { /* ... 元のまま ... */ }

// ==================== 強化アラーム（ここが重要）===================
function playBeep() {
  initAudio();
  try {
    const beep = (freq, duration, delay = 0) => {
      setTimeout(() => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();
        osc.type = 'sawtooth';
        osc.frequency.value = freq;
        gain.gain.value = 0.7;
        filter.type = 'lowpass';
        filter.frequency.value = 1200;
        osc.connect(filter).connect(gain).connect(audioCtx.destination);
        osc.start();
        gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + duration/1000 + 0.3);
        osc.stop(audioCtx.currentTime + duration/1000 + 0.4);
      }, delay);
    };
    beep(880, 120, 0);
    beep(660, 160, 180);
    beep(1100, 220, 420);
    beep(1320, 280, 700);
  } catch(e) {}
}

// 男声（Siri系）優先で再生
function playAlarm() {
  initAudio();
  audioCtx.resume();
  playBeep();
  if (navigator.vibrate) navigator.vibrate([300, 100, 300, 100, 500]);

  if ('speechSynthesis' in window) {
    const utterance = new SpeechSynthesisUtterance(currentAlarmMessage);
    utterance.lang = 'ja-JP';
    utterance.rate = 1.05;
    utterance.pitch = 0.95;   // 男声向け少し低め
    utterance.volume = 1.0;

    const voices = speechSynthesis.getVoices();

    // Siri男声1（Otoya / Hattori）を最優先
    let targetVoice = voices.find(v => 
      v.name.includes('Otoya') || 
      v.name.includes('Hattori') ||
      v.name.toLowerCase().includes('siri_male')
    );

    if (targetVoice) {
      utterance.voice = targetVoice;
      console.log("🎤 使用音声:", targetVoice.name);
    } else {
      console.log("⚠️ Otoya/Hattoriが見つかりませんでした（デフォルトを使います）");
    }

    speechSynthesis.cancel();
    speechSynthesis.speak(utterance);
  }
}

// ==================== テスト用 ====================
function testSound() {
  currentAlarmMessage = "テストだ。Grokの男声で聞こえるか？";
  playAlarm();
}

// 初期化
updateStreak();
updateDisplay();
</script>
</body>
</html>
