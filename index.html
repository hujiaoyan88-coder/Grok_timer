<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grok タイマー</title>
<style>
  body {
    background: #0f0f1a;
    color: #fff;
    font-family: system-ui, -apple-system, sans-serif;
    margin: 0;
    padding: 20px;
    min-height: 100vh;
  }
  .container {
    max-width: 620px;
    margin: 0 auto;
  }
  h1 {
    text-align: center;
    font-size: 2.2rem;
    margin-bottom: 10px;
    color: #4a90e2;
  }
  #display {
    font-size: 7rem;
    font-weight: 700;
    text-align: center;
    background: #1a1a2e;
    padding: 30px 20px;
    border-radius: 24px;
    border: 4px solid #4a90e2;
    margin: 20px 0;
    font-family: monospace;
    letter-spacing: 4px;
  }
  .quick-buttons {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 25px;
  }
  button {
    padding: 18px 10px;
    font-size: 1.3rem;
    font-weight: 600;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.1s ease;
    color: white;
  }
  button:active {
    transform: scale(0.96);
  }
  .quick-btn {
    background: #16213e;
    font-size: 1.4rem;
  }
  .quick-btn:hover {
    background: #1f2a4a;
  }
  .controls {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 25px;
  }
  #startBtn { background: #4a90e2; font-size: 1.4rem; padding: 18px 40px; }
  #pauseBtn { background: #e67e22; }
  #resetBtn { background: #555; }
  
  .custom-section {
    background: #1a1a2e;
    padding: 20px;
    border-radius: 20px;
    margin-bottom: 20px;
  }
  .custom-inputs {
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: center;
    margin-bottom: 15px;
  }
  input[type="number"] {
    width: 90px;
    padding: 12px;
    font-size: 1.4rem;
    text-align: center;
    border: 2px solid #4a90e2;
    border-radius: 12px;
    background: #0f0f1a;
    color: white;
  }
  .message {
    text-align: center;
    font-size: 1.3rem;
    min-height: 40px;
    color: #4ade80;
    margin-top: 10px;
  }
  .test-btn {
    background: #6b46c1;
    width: 100%;
    margin-top: 10px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>⏱️ Grok タイマー</h1>
  
  <div id="display">00:00</div>
  
  <!-- ワンタップボタン -->
  <div class="quick-buttons">
    <button class="quick-btn" onclick="startQuick(30)">30秒</button>
    <button class="quick-btn" onclick="startQuick(60)">1分</button>
    <button class="quick-btn" onclick="startQuick(300)">5分</button>
    <button class="quick-btn" onclick="startQuick(600)">10分</button>
  </div>
  
  <!-- カスタム -->
  <div class="custom-section">
    <div style="text-align:center; margin-bottom:10px; font-weight:600;">カスタム時間</div>
    <div class="custom-inputs">
      <input type="number" id="minInput" placeholder="分" min="0" value="0">
      <span style="font-size:1.5rem;">：</span>
      <input type="number" id="secInput" placeholder="秒" min="0" max="59" value="30">
    </div>
    <button onclick="startCustom()" style="width:100%; background:#4a90e2; padding:16px; font-size:1.3rem; border-radius:16px;">この時間でスタート</button>
  </div>
  
  <!-- 操作ボタン -->
  <div class="controls">
    <button id="startBtn" onclick="startTimer()">▶ スタート</button>
    <button id="pauseBtn" onclick="pauseTimer()">⏸ 一時停止</button>
    <button id="resetBtn" onclick="resetTimer()">↺ リセット</button>
  </div>
  
  <div id="message" class="message"></div>
  
  <button class="test-btn" onclick="playAlarm()">🔊 アラームをテスト</button>
</div>

<script>
let timeLeft = 0;
let intervalId = null;
let display = document.getElementById('display');
let messageEl = document.getElementById('message');

function updateDisplay() {
  const min = Math.floor(timeLeft / 60);
  const sec = timeLeft % 60;
  display.textContent = 
    String(min).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
}

function setTime(seconds) {
  pauseTimer();
  timeLeft = seconds;
  updateDisplay();
  messageEl.textContent = '';
  display.style.color = '#fff';
}

function startQuick(seconds) {
  setTime(seconds);
  startTimer();
}

function startCustom() {
  const min = parseInt(document.getElementById('minInput').value) || 0;
  const sec = parseInt(document.getElementById('secInput').value) || 0;
  const total = min * 60 + sec;
  if (total > 0) {
    setTime(total);
    startTimer();
  } else {
    alert('時間を入力してね！');
  }
}

function startTimer() {
  if (intervalId) return; // すでに動いている
  if (timeLeft <= 0) return;

  intervalId = setInterval(() => {
    timeLeft--;
    updateDisplay();

    if (timeLeft <= 0) {
      clearInterval(intervalId);
      intervalId = null;
      endTimer();
    }
  }, 1000);
}

function pauseTimer() {
  if (intervalId) {
    clearInterval(intervalId);
    intervalId = null;
  }
}

function resetTimer() {
  pauseTimer();
  timeLeft = 0;
  updateDisplay();
  messageEl.textContent = '';
  display.style.color = '#fff';
}

function endTimer() {
  display.style.color = '#ff6b6b';
  messageEl.innerHTML = '🎉 タイマー終了！';
  playAlarm();
}

function playAlarm() {
  // ビープ音（Web Audio API）
  try {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const playBeep = (freq, duration, delay) => {
      setTimeout(() => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.value = 0.6;

        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 1200;

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start();
        setTimeout(() => {
          gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
          setTimeout(() => osc.stop(), 150);
        }, duration);
      }, delay);
    };

    // 3回ビープ
    playBeep(880, 180, 0);
    playBeep(990, 180, 280);
    playBeep(1100, 220, 560);
  } catch(e) {}

  // 振動（スマホ対応）
  if (navigator.vibrate) {
    navigator.vibrate([200, 100, 200, 100, 400]);
  }

  // Grokオリジナル音声（日本語）
  if ('speechSynthesis' in window) {
    const utterance = new SpeechSynthesisUtterance(
      'タイマー終了です！ Grokです。次のミッションは何ですか？ 準備はできましたか？'
    );
    utterance.lang = 'ja-JP';
    utterance.rate = 1.05;
    utterance.pitch = 1.0;
    utterance.volume = 1.0;

    setTimeout(() => {
      speechSynthesis.speak(utterance);
    }, 900);
  } else {
    alert('このブラウザでは音声が使えません');
  }
}

// 初期表示
updateDisplay();
</script>
</body>
</html>
